disabled_rules:
  - trailing_whitespace
  - line_length
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - force_unwrapping
  - empty_count

included:
  - FIN1/
  - FIN1Tests/

excluded:
  - FIN1/Documentation
  - FIN1.xcodeproj
  - FIN1/Assets.xcassets

identifier_name:
  min_length: 3
  excluded:
    - id
    - x
    - y

force_unwrapping:
  severity: warning

# Custom rules for ResponsiveDesign compliance
custom_rules:
  no_fixed_fonts:
    name: "No Fixed Fonts"
    regex: "\\.font\\(\\.(title|title2|title3|headline|subheadline|body|caption|caption2|footnote|largeTitle)\\)"
    message: "Use ResponsiveDesign font methods instead of fixed fonts (e.g., ResponsiveDesign.titleFont())"
    severity: error

  no_fixed_spacing:
    name: "No Fixed Spacing"
    regex: "(VStack|HStack)\\(spacing:\\s*[0-9]+"
    message: "Use ResponsiveDesign.spacing(N) instead of fixed spacing values"
    severity: error

  no_excessive_vstack_spacing:
    name: "No Excessive VStack Spacing"
    regex: "VStack\\([^)]*spacing:\\s*ResponsiveDesign\\.spacing\\((2[4-9]|[3-9][0-9]|[1-9][0-9][0-9]+)"
    message: "VStack spacing should be ≤ 16pt for main containers. Use ResponsiveDesign.spacing(6) for optimal spacing"
    severity: error

  no_responsive_padding_in_main_views:
    name: "No ResponsivePadding in Main Views"
    regex: "\\.responsivePadding\\(\\)"
    message: "Use .padding(.horizontal, ResponsiveDesign.horizontalPadding()) + .padding(.top, ResponsiveDesign.spacing(8)) instead of .responsivePadding() for main views"
    severity: error
    excluded_patterns:
      - "FIN1/Features/Dashboard/Views/Components/DashboardContainer.swift"
      - "FIN1/Features/Trader/Views/SecuritiesSearchView.swift"
      - "FIN1/Features/Trader/Views/TraderDepotView.swift"
      - "FIN1Tests/UISpacingRegressionTests.swift"

  no_fixed_corner_radius:
    name: "No Fixed Corner Radius"
    regex: "\\.cornerRadius\\([0-9]+"
    message: "Use ResponsiveDesign.spacing(N) for corner radius values"
    severity: error

  no_fixed_rounded_rectangle:
    name: "No Fixed RoundedRectangle Corner Radius"
    regex: "RoundedRectangle\\(cornerRadius:\\s*[0-9]+"
    message: "Use ResponsiveDesign.spacing(N) for RoundedRectangle corner radius"
    severity: error

  no_fixed_padding:
    name: "No Fixed Padding"
    regex: "\\.padding\\([0-9]+"
    message: "Use ResponsiveDesign.spacing(N) for padding values or .responsivePadding()"
    severity: error

  # MVVM Architecture Rules
  no_viewmodel_instantiation_in_body:
    name: "No ViewModel Instantiation in View Body"
    regex: "@StateObject\\s+private\\s+var\\s+\\w+\\s*=\\s*\\w+ViewModel\\("
    message: "ViewModels must be created in init() method, not in property declaration"
    severity: error

  no_singleton_usage_outside_root:
    name: "No Singleton Usage Outside Composition Root"
    regex: "\\.shared"
    message: "Use dependency injection instead of singletons outside composition root"
    severity: error
    excluded:
      - "FIN1App.swift"
      - "**/AppTheme.swift"
      - "**/ResponsiveDesign.swift"
      - "**/ThemeManager.swift"
      - "**/EventBus.swift"
      - "**/OptimizedImageView.swift"
      - "**/WatchlistCards.swift"
      - "**/NotificationServiceProtocol.swift"
      - "**/CleanServiceProtocol.swift"
      - "**/KeyboardDismissalModifier.swift"
      - "**/PerformanceMonitor.swift"
      - "**/PerformanceOptimizedView.swift"
      - "**/PDFDownloadService.swift"
      - "**/UserValidationService.swift"
      - "**/NotificationCardComponents.swift"
      - "**/NotificationsTrader.swift"
      - "**/NotificationsView.swift"
      - "**/NotificationsInvestor.swift"
    # Exclude system singletons that are part of iOS SDK
    excluded_patterns:
      - "UIApplication\\.shared"
      - "NotificationCenter\\.default"
      - "UserDefaults\\.standard"
      - "FileManager\\.default"

  no_private_service_init:
    name: "No Private Service Initializers"
    regex: "private\\s+init\\(\\)"
    message: "Service initializers must be public for proper dependency injection"
    severity: error

  no_navigation_view:
    name: "No Deprecated NavigationView"
    regex: "NavigationView"
    message: "Use NavigationStack instead of deprecated NavigationView"
    severity: error

  no_service_viewmodel_property:
    name: "No ViewModel Properties in Services"
    regex: "@Published\\s+var\\s+\\w+ViewModel"
    message: "Services should not contain ViewModel properties - ViewModels are managed by Views"
    severity: error

  no_direct_service_access_in_view:
    name: "No Direct Service Access in Views"
    regex: "AppServices\\.live\\."
    message: "Use @Environment(\\.appServices) instead of direct AppServices.live access"
    severity: error

  no_hardcoded_service_dependencies:
    name: "No Hardcoded Service Dependencies"
    regex: "private\\s+let\\s+\\w+\\s*=\\s*\\w+Service\\.shared"
    message: "Inject services via constructor parameters instead of hardcoded dependencies"
    severity: error

  no_data_formatting_in_view:
    name: "No Data Formatting in Views"
    regex: "\\.(formatted|formattedAs|formattedAsLocalized)"
    message: "Data formatting must be done in ViewModel, not in View. Move formatting logic to ViewModel properties"
    severity: error
    excluded:
      - "**/ViewModels/**"
      - "**/Models/**"
      - "**/Extensions/**"
      - "**/*ViewModel.swift"
      - "**/*Model.swift"
      - "**/*Extension.swift"

  no_date_formatting_in_view:
    name: "No Date Formatting in Views"
    regex: "\\.formatted\\(date:"
    message: "Date formatting must be done in ViewModel, not in View. Move formatting logic to ViewModel properties"
    severity: error
    excluded:
      - "**/ViewModels/**"
      - "**/Models/**"
      - "**/Extensions/**"
      - "**/*ViewModel.swift"
      - "**/*Model.swift"
      - "**/*Extension.swift"

  no_direct_model_property_access_in_view:
    name: "No Direct Model Property Access in Views"
    regex: "(let|var)\\s+\\w+:\\s*(Investment|Trade|Order|Invoice|User|MockTrader|DepotHolding)\\s*[^}]*\\2\\."
    message: "Views should not directly access model properties. Create a ViewModel to handle data transformation and formatting"
    severity: warning
    excluded:
      - "**/ViewModels/**"
      - "**/Models/**"
      - "**/*ViewModel.swift"
      - "**/*Model.swift"
      - "**/*Wrapper.swift"

  no_missing_viewmodel_for_model_view:
    name: "No Missing ViewModel for Model-Based Views"
    regex: "struct\\s+\\w+View.*\\{[^}]*let\\s+\\w+:\\s*(Investment|Trade|Order|Invoice|User|MockTrader|DepotHolding)[^}]*var\\s+body[^}]*@StateObject.*ViewModel"
    message: "View has model property but no @StateObject ViewModel. Create a ViewModel to handle data transformation"
    severity: warning
    match_kinds:
      - identifier
    excluded:
      - "**/ViewModels/**"
      - "**/Models/**"
      - "**/*ViewModel.swift"
      - "**/*Model.swift"
      - "**/*Wrapper.swift"
      - "**/*Preview.swift"

  no_model_formatting_without_viewmodel:
    name: "No Model Formatting Without ViewModel"
    regex: "(let|var)\\s+\\w+:\\s*(Investment|Trade|Order|Invoice|User|MockTrader|DepotHolding).*\\2\\.(amount|createdAt|updatedAt|date|price|totalAmount)\\.(formatted|formattedAs)"
    message: "Model property formatting detected without ViewModel. Move formatting to ViewModel properties"
    severity: error
    excluded:
      - "**/ViewModels/**"
      - "**/Models/**"
      - "**/*ViewModel.swift"
      - "**/*Model.swift"
      - "**/*Extension.swift"

reporter: xcode


