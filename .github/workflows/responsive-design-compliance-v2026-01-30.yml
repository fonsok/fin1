name: ResponsiveDesign Compliance Check

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  responsive-design-compliance:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Install SwiftFormat
      run: brew install swiftformat

    - name: Run ResponsiveDesign Compliance Check
      run: |
        chmod +x scripts/check-responsive-design.sh
        ./scripts/check-responsive-design.sh

    - name: Run SwiftLint
      run: swiftlint --strict

    - name: Run SwiftFormat Check
      run: swiftformat . --lint

    - name: Build Project
      run: |
        xcodebuild -project FIN1.xcodeproj \
                   -scheme FIN1 \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
                   build

    - name: Run Tests
      run: |
        xcodebuild -project FIN1.xcodeproj \
                   -scheme FIN1 \
                   -sdk iphonesimulator \
                   -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
                   test
