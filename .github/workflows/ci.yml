name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # HTTP smoke on 127.0.0.1 only (no LAN secrets). Validates /health + getConfig shape.
  parse-smoke-local-mock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Cloud — no configHelper.js shadow file
        run: |
          chmod +x scripts/check-parse-cloud-config-helper-shadow.sh
          ./scripts/check-parse-cloud-config-helper-shadow.sh

      - name: Local Parse-shaped API smoke
        run: |
          set -euo pipefail
          chmod +x scripts/ci-smoke-local-mock.sh
          ./scripts/ci-smoke-local-mock.sh

  admin-portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:run

      - name: Typecheck & production build
        run: npm run build

  build-test-lint:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache SwiftLint
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.swiftlint.yml') }}

      - name: Install tools
        run: |
          brew update
          brew install swiftlint swiftformat danger/tap/danger-swift || true

      - name: SwiftFormat
        run: swiftformat . --lint

      # Non-strict: custom rules and many stock rules are warnings; `swiftlint lint` exits 0 unless
      # there are error-severity violations. Use `swiftlint --strict` locally when clearing the backlog.
      - name: SwiftLint
        run: swiftlint

      - name: Build and Test (iOS Simulator)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          set -eo pipefail
          chmod +x scripts/run-ios-tests.sh
          # Concrete UDID avoids name=… + OS:latest mismatch on mixed Xcode/runtimes.
          ./scripts/run-ios-tests.sh

      - name: Build Release + Staging + Prod configurations (simulator)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          set -euo pipefail
          chmod +x scripts/build-ios-config.sh
          ./scripts/build-ios-config.sh FIN1 Release
          ./scripts/build-ios-config.sh FIN1-Staging Staging
          ./scripts/build-ios-config.sh FIN1-Prod Prod

      - name: Static analyzer (Release simulator)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          set -euo pipefail
          chmod +x scripts/analyze-ios-config.sh
          ./scripts/analyze-ios-config.sh FIN1 Release

      - name: Check Bundle Size (Release)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          chmod +x scripts/check-bundle-size.sh
          ./scripts/check-bundle-size.sh Release

      - name: Prod xcconfig release script (syntax + runnable; placeholders OK in CI)
        run: |
          set -euo pipefail
          bash -n scripts/check-prod-xcconfig-for-release.sh
          chmod +x scripts/check-prod-xcconfig-for-release.sh
          FIN1_ALLOW_PROD_PLACEHOLDERS=1 ./scripts/check-prod-xcconfig-for-release.sh

      - name: Validate Separation of Concerns
        run: |
          chmod +x scripts/validate-separation-of-concerns.sh
          ./scripts/validate-separation-of-concerns.sh

      - name: Check File Sizes
        run: |
          chmod +x scripts/check-file-sizes.sh
          ./scripts/check-file-sizes.sh

      - name: Danger
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: danger-swift ci



