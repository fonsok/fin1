name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # HTTP smoke on 127.0.0.1 only (no LAN secrets). Validates /health + getConfig shape.
  parse-smoke-local-mock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: No tracked admin SPA build trees
        run: |
          chmod +x scripts/check-no-tracked-admin-spa-artifacts.sh
          ./scripts/check-no-tracked-admin-spa-artifacts.sh

      - name: Parse Cloud — no configHelper.js shadow file
        run: |
          chmod +x scripts/check-parse-cloud-config-helper-shadow.sh
          ./scripts/check-parse-cloud-config-helper-shadow.sh

      - name: Parse Cloud — naming conventions
        run: |
          chmod +x scripts/check-parse-cloud-naming-conventions.sh
          ./scripts/check-parse-cloud-naming-conventions.sh

      - name: Local Parse-shaped API smoke
        run: |
          set -euo pipefail
          chmod +x scripts/ci-smoke-local-mock.sh
          ./scripts/ci-smoke-local-mock.sh

  # Parse Cloud Code — full Jest suite (financial / ledger regressions). Runs on every PR/push to main|master.
  parse-server-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/parse-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/parse-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit & integration tests (Jest)
        run: npm test -- --ci

  admin-portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-portal
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:run

      - name: Typecheck & production build
        run: npm run build

  build-test-lint:
    # macos-15 runner-images ship iOS 18.5+18.6 simulators for iPhone 16; use 18.6 so local Xcode
    # installs (often 18.6, not 18.5) match CI without extra env (see Makefile / run-ios-tests.sh).
    runs-on: macos-15
    env:
      IOS_TEST_DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.6
      IOS_BUILD_DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.6
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Pin Xcode (not only default /Applications/Xcode.app): Xcode 16.4 vs 26 differs in Swift/SDK
      # checks; 26.0.1 matches typical dev installs on macos-15 images and avoids spurious CI-only fails.
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      - name: Xcode toolchain (for logs)
        run: xcodebuild -version && xcode-select -p

      - name: Cache SwiftLint
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.swiftlint.yml') }}

      - name: Install tools
        run: |
          brew update
          brew install swiftlint swiftformat danger/tap/danger-swift || true

      # Lint Swift sources only (avoid scanning local build trees; matches clean CI checkout).
      - name: SwiftFormat
        run: |
          swiftformat FIN1 FIN1Tests FIN1UITests FIN1InvestorTests FIN1CoreRegressionTests --lint

      # Non-strict: custom rules and many stock rules are warnings; `swiftlint lint` exits 0 unless
      # there are error-severity violations. Use `swiftlint --strict` locally when clearing the backlog.
      - name: SwiftLint
        run: swiftlint

      - name: Build and Test (iOS Simulator)
        run: |
          set -eo pipefail
          chmod +x scripts/run-ios-tests.sh
          ./scripts/run-ios-tests.sh

      - name: Build Release + Staging + Prod configurations (simulator)
        run: |
          set -euo pipefail
          chmod +x scripts/build-ios-config.sh
          ./scripts/build-ios-config.sh FIN1 Release
          ./scripts/build-ios-config.sh FIN1-Staging Staging
          ./scripts/build-ios-config.sh FIN1-Prod Prod

      - name: Static analyzer (Release simulator)
        run: |
          set -euo pipefail
          chmod +x scripts/analyze-ios-config.sh
          ./scripts/analyze-ios-config.sh FIN1 Release

      - name: Check Bundle Size (Release)
        run: |
          chmod +x scripts/check-bundle-size.sh
          ./scripts/check-bundle-size.sh Release

      - name: Prod xcconfig release script (syntax + runnable; placeholders OK in CI)
        run: |
          set -euo pipefail
          bash -n scripts/check-prod-xcconfig-for-release.sh
          chmod +x scripts/check-prod-xcconfig-for-release.sh
          FIN1_ALLOW_PROD_PLACEHOLDERS=1 ./scripts/check-prod-xcconfig-for-release.sh

      - name: Validate Separation of Concerns
        run: |
          chmod +x scripts/validate-separation-of-concerns.sh
          ./scripts/validate-separation-of-concerns.sh

      - name: Check File Sizes
        run: |
          chmod +x scripts/check-file-sizes.sh
          ./scripts/check-file-sizes.sh

      - name: Danger
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: danger-swift ci



