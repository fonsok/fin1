# Parse-Server-Produktions-Image: CI-Build; Push nach GHCR nur auf main/master (kein PR-Push).
# Merge-Compose für Host-Pull: docker-compose.parse-server-ghcr.yml
# Siehe Documentation/MODERN_DEPLOY_BEST_PRACTICES.md § 8 und FIN1_APP_DOCS/06A § 8.1.
name: Parse Server Docker image (CI)

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/parse-server/**'
      - 'backend/node-service.Dockerfile'
      - 'docker-compose.production.yml'
      - 'docker-compose.parse-server-ghcr.yml'
      - '.github/workflows/parse-server-docker-build.yml'
  push:
    branches: [main, master]
    paths:
      - 'backend/parse-server/**'
      - 'backend/node-service.Dockerfile'
      - 'docker-compose.production.yml'
      - 'docker-compose.parse-server-ghcr.yml'
      - '.github/workflows/parse-server-docker-build.yml'

concurrency:
  group: parse-server-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR image repository (lowercase owner)
        id: ghcr_repo
        run: |
          o="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "repo=ghcr.io/${o}/fin1-parse-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build parse-server image (push to GHCR on main/master, non-PR)
        uses: docker/build-push-action@v6
        with:
          context: backend/parse-server
          file: backend/node-service.Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            fin1-parse-server:ci
            ${{ steps.ghcr_repo.outputs.repo }}:${{ github.sha }}
            ${{ steps.ghcr_repo.outputs.repo }}:${{ github.ref_name }}
          build-args: |
            SERVICE_PORT=1337
            EXTRA_DIR=certs
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
