name: ResponsiveDesign Compliance Check

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  responsive-design-compliance:
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Detect iOS-relevant changes
      id: ios_changes
      run: |
        set -euo pipefail
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
        else
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
        fi
        if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
          echo "ios=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        PATTERN='^(FIN1/|FIN1Tests/|FIN1UITests/|FIN1InvestorTests/|FIN1CoreRegressionTests/|scripts/check-responsive-design|scripts/validate-main-view-spacing|scripts/run-ios-tests|scripts/resolve-ios-sim|FIN1\.xcodeproj/)'
        if git diff --name-only "$BASE" "$HEAD" | grep -qE "$PATTERN"; then
          echo "ios=true" >> "$GITHUB_OUTPUT"
        else
          echo "ios=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Skip iOS checks (backend/docs-only diff)
      if: steps.ios_changes.outputs.ios != 'true'
      run: |
        echo "No FIN1 Swift/xcodeproj changes in this diff — ResponsiveDesign build/tests skipped."

    - name: Setup Xcode
      if: steps.ios_changes.outputs.ios == 'true'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        # Match main CI Xcode pin (see ci.yml) for consistent Swift/SDK with local dev.
        xcode-version: '26.0.1'

    - name: Install SwiftLint
      if: steps.ios_changes.outputs.ios == 'true'
      run: brew install swiftlint

    - name: Install SwiftFormat
      if: steps.ios_changes.outputs.ios == 'true'
      run: brew install swiftformat

    - name: Run ResponsiveDesign Compliance Check
      if: steps.ios_changes.outputs.ios == 'true'
      run: |
        chmod +x scripts/check-responsive-design.sh
        ./scripts/check-responsive-design.sh

    - name: Run SwiftLint
      if: steps.ios_changes.outputs.ios == 'true'
      run: swiftlint

    - name: Run SwiftFormat Check
      if: steps.ios_changes.outputs.ios == 'true'
      run: |
        swiftformat FIN1 FIN1Tests FIN1UITests FIN1InvestorTests FIN1CoreRegressionTests --lint

    - name: Resolve iOS simulator destination
      if: steps.ios_changes.outputs.ios == 'true'
      run: |
        chmod +x scripts/resolve-ios-sim-destination.sh
        echo "Resolved: $(./scripts/resolve-ios-sim-destination.sh)"

    # Compile-only: use generic simulator destination so CI does not depend on a
    # specific runtime (OS=18.6) being installed exactly as named on the runner.
    - name: Build Project
      if: steps.ios_changes.outputs.ios == 'true'
      run: |
        xcodebuild -project FIN1.xcodeproj \
                   -scheme FIN1 \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'generic/platform=iOS Simulator' \
                   build

    # Match main CI: full `xcodebuild test` runs all scheme testables (incl. UITests) and is slow/flaky.
    - name: Run Tests (unit — FIN1Tests only)
      if: steps.ios_changes.outputs.ios == 'true'
      env:
        IOS_TEST_TARGETS: 'FIN1Tests'
      run: |
        set -euo pipefail
        chmod +x scripts/run-ios-tests.sh
        ./scripts/run-ios-tests.sh
