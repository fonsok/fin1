name: ResponsiveDesign Compliance Check

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  responsive-design-compliance:
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        # Match main CI: objectVersion 77 requires Xcode 16+; avoid older "stable" on some images.
        xcode-version: '16.4'

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Install SwiftFormat
      run: brew install swiftformat

    - name: Run ResponsiveDesign Compliance Check
      run: |
        chmod +x scripts/check-responsive-design.sh
        ./scripts/check-responsive-design.sh

    - name: Run SwiftLint
      run: swiftlint

    - name: Run SwiftFormat Check
      run: |
        swiftformat FIN1 FIN1Tests FIN1UITests FIN1InvestorTests FIN1CoreRegressionTests --lint

    - name: Build Project
      run: |
        xcodebuild -project FIN1.xcodeproj \
                   -scheme FIN1 \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.6' \
                   build

    # Match main CI: full `xcodebuild test` runs all scheme testables (incl. UITests) and is slow/flaky.
    - name: Run Tests (unit — FIN1Tests only)
      env:
        IOS_TEST_DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=18.6'
        IOS_TEST_TARGETS: 'FIN1Tests'
      run: |
        set -euo pipefail
        chmod +x scripts/run-ios-tests.sh
        ./scripts/run-ios-tests.sh
