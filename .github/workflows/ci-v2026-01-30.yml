name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-lint:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache SwiftLint
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.swiftlint.yml') }}

      - name: Install tools
        run: |
          brew update
          brew install swiftlint swiftformat danger/tap/danger-swift || true

      - name: SwiftFormat
        run: swiftformat . --lint

      - name: SwiftLint
        run: swiftlint --strict

      - name: Build and Test (iOS Simulator)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          xcodebuild -project FIN1.xcodeproj -scheme FIN1 -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15 Pro' test | xcpretty || true
          test -f ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult || exit 1

      - name: Check Bundle Size (Release)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          chmod +x scripts/check-bundle-size.sh
          ./scripts/check-bundle-size.sh Release

      - name: Validate Separation of Concerns
        run: |
          chmod +x scripts/validate-separation-of-concerns.sh
          ./scripts/validate-separation-of-concerns.sh

      - name: Check File Sizes
        run: |
          chmod +x scripts/check-file-sizes.sh
          ./scripts/check-file-sizes.sh

      - name: Danger
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: danger-swift ci



