# Extended iOS test matrix — slower than PR CI; catches gaps after removing disabled tests.
#
# Schedule: weekly Monday 05:15 UTC (off-peak). Also runnable manually (workflow_dispatch).
#
# PR / push CI remains .github/workflows/ci.yml → scripts/run-ios-tests.sh (FIN1Tests only).
#
# Runs FIN1Tests, FIN1InvestorTests, and FIN1CoreRegressionTests (unit targets).

name: iOS extended tests

on:
  workflow_dispatch:
  schedule:
    - cron: '15 5 * * 1'

concurrency:
  group: ios-extended-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-extended:
    name: iOS extended (unit + investor + core regression)
    runs-on: macos-15
    timeout-minutes: 90
    env:
      IOS_TEST_DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.6
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      - name: Xcode toolchain (for logs)
        run: xcodebuild -version && xcode-select -p

      - name: Extended unit targets (no UI by default)
        env:
          IOS_TEST_TARGETS: 'FIN1Tests,FIN1InvestorTests,FIN1CoreRegressionTests'
        run: |
          set -euo pipefail
          chmod +x scripts/run-ios-tests.sh
          ./scripts/run-ios-tests.sh

      - name: UI tests (optional — enable via repo variable IOS_EXTENDED_RUN_UI_TESTS)
        if: vars.IOS_EXTENDED_RUN_UI_TESTS == 'true'
        env:
          IOS_TEST_TARGETS: 'FIN1UITests'
        run: |
          set -euo pipefail
          chmod +x scripts/run-ios-tests.sh
          ./scripts/run-ios-tests.sh
