# docker compose config für Produktions-Compose (Syntax + ${…}-Interpolation), ohne Stack-Start.
# Siehe scripts/ci-validate-docker-compose-production.sh und Documentation/MODERN_DEPLOY_BEST_PRACTICES.md.
name: Compose production config

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - 'docker-compose.production.yml'
      - 'docker-compose.parse-server-ghcr.yml'
      - 'backend/node-service.Dockerfile'
      - 'scripts/ci/**'
      - 'scripts/ci-validate-docker-compose-production.sh'
      - '.github/workflows/compose-production-validate.yml'
  push:
    branches: [main, master]
    paths:
      - 'docker-compose.production.yml'
      - 'docker-compose.parse-server-ghcr.yml'
      - 'backend/node-service.Dockerfile'
      - 'scripts/ci/**'
      - 'scripts/ci-validate-docker-compose-production.sh'
      - '.github/workflows/compose-production-validate.yml'

concurrency:
  group: compose-prod-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.production.yml
        run: |
          set -euo pipefail
          chmod +x scripts/ci-validate-docker-compose-production.sh
          ./scripts/ci-validate-docker-compose-production.sh
