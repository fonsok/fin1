<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textbausteine - FIN1 Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <nav class="sidebar">
            <div class="logo">
                <h2>FIN1 Admin</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html">
                        <span class="icon">📊</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="templates.html">
                        <span class="icon">📝</span>
                        <span>Templates</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="email-templates.html">
                        <span class="icon">📧</span>
                        <span>E-Mail Vorlagen</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span class="icon">👤</span>
                    <span id="current-user">Admin</span>
                </div>
                <button class="btn btn-sm" onclick="logout()">Logout</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h1>Textbausteine verwalten</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showCreateModal()">
                        + Neuer Textbaustein
                    </button>
                </div>
            </header>

            <section class="content">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Suchen..." onkeyup="filterTemplates()">
                    </div>
                    <div class="filter-group">
                        <select id="category-filter" class="form-control" onchange="filterTemplates()">
                            <option value="">Alle Kategorien</option>
                        </select>
                        <select id="role-filter" class="form-control" onchange="loadTemplates()">
                            <option value="teamlead">Teamlead (alle)</option>
                            <option value="level_1">Level 1</option>
                            <option value="level_2">Level 2</option>
                            <option value="fraud_analyst">Fraud</option>
                            <option value="compliance_officer">Compliance</option>
                            <option value="tech_support">Tech Support</option>
                        </select>
                    </div>
                </div>

                <!-- Templates Table -->
                <div class="card">
                    <div id="templates-container">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Create/Edit Modal -->
    <div id="template-modal" class="modal-overlay" onclick="if(event.target === this) Modal.hide('template-modal')">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Neuer Textbaustein</h3>
                <button class="modal-close" onclick="Modal.hide('template-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="template-form" onsubmit="saveTemplate(event)">
                    <input type="hidden" id="template-id">

                    <div class="form-group">
                        <label for="template-title">Titel *</label>
                        <input type="text" id="template-title" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="template-title-de">Titel (Deutsch)</label>
                        <input type="text" id="template-title-de" class="form-control">
                    </div>

                    <div class="form-group">
                        <label for="template-category">Kategorie *</label>
                        <select id="template-category" class="form-control" required>
                            <option value="">Bitte wählen...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="template-is-email"> E-Mail Template
                        </label>
                    </div>

                    <div class="form-group" id="subject-group" style="display: none;">
                        <label for="template-subject">Betreff</label>
                        <input type="text" id="template-subject" class="form-control">
                    </div>

                    <div class="form-group">
                        <label for="template-body">Inhalt *</label>
                        <textarea id="template-body" class="form-control" rows="8" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="template-shortcut">Shortcut (z.B. /hi)</label>
                        <input type="text" id="template-shortcut" class="form-control" placeholder="/...">
                    </div>

                    <div class="form-group">
                        <label for="template-placeholders">Platzhalter (kommagetrennt)</label>
                        <input type="text" id="template-placeholders" class="form-control" placeholder="{{KUNDENNAME}}, {{AGENTNAME}}">
                    </div>

                    <div class="form-group">
                        <label>Verfügbar für Rollen:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="roles" value="level_1" checked> Level 1</label>
                            <label><input type="checkbox" name="roles" value="level_2" checked> Level 2</label>
                            <label><input type="checkbox" name="roles" value="fraud_analyst"> Fraud</label>
                            <label><input type="checkbox" name="roles" value="compliance_officer"> Compliance</label>
                            <label><input type="checkbox" name="roles" value="tech_support"> Tech Support</label>
                            <label><input type="checkbox" name="roles" value="teamlead" checked> Teamlead</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.hide('template-modal')">Abbrechen</button>
                <button class="btn btn-primary" onclick="document.getElementById('template-form').requestSubmit()">Speichern</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay" onclick="if(event.target === this) Modal.hide('delete-modal')">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3>Template löschen?</h3>
                <button class="modal-close" onclick="Modal.hide('delete-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p>Möchten Sie das Template <strong id="delete-template-name"></strong> wirklich löschen?</p>
                <p class="text-muted">Diese Aktion kann nicht rückgängig gemacht werden.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.hide('delete-modal')">Abbrechen</button>
                <button class="btn btn-danger" id="confirm-delete-btn">Löschen</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/templates.js"></script>
</body>
</html>
