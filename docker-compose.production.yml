# FIN1 Production Docker Compose - Hardened
# Last updated: 2026-02-23
# Changes: TLS, port binding, resource limits, log rotation, monitoring, network segmentation

services:
  parse-server:
    build:
      context: ./backend/parse-server
      dockerfile: Dockerfile
    container_name: fin1-parse-server
    ports:
      - "127.0.0.1:1338:1337"
    env_file:
      - ./backend/.env
    environment:
      - PARSE_SERVER_DATABASE_URI=mongodb://admin:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/fin1?authSource=admin
      - PARSE_SERVER_CLOUD_CODE_MAIN=./cloud/main.js
    volumes:
      - ./backend/parse-server/cloud:/app/cloud
      - ./backend/parse-server/certs:/app/certs
      - ./backend/parse-server/logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    image: mongo:7.0
    container_name: fin1-mongodb
    ports:
      - "127.0.0.1:27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=fin1
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongodb/init:/docker-entrypoint-initdb.d
      - ./logs/mongodb:/var/log/mongodb
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: fin1-redis
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: fin1-postgres
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_DB=fin1_analytics
      - POSTGRES_USER=fin1_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init:/docker-entrypoint-initdb.d
      - ./logs/postgres:/var/log/postgresql
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin1_user -d fin1_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: fin1-minio
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - ./logs/minio:/var/log/minio
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: fin1-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
      - ./admin:/var/www/admin:ro
    depends_on:
      parse-server:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  market-data:
    build:
      context: ./backend/market-data
      dockerfile: Dockerfile
    container_name: fin1-market-data
    ports:
      - "127.0.0.1:8083:8080"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    depends_on:
      redis:
        condition: service_healthy
      parse-server:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: fin1-notification-service
    ports:
      - "127.0.0.1:8084:8081"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8081
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    volumes:
      - ./backend/notification-service/certs:/app/certs:ro
      - ./logs/notifications:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      parse-server:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  analytics-service:
    build:
      context: ./backend/analytics-service
      dockerfile: Dockerfile
    container_name: fin1-analytics-service
    ports:
      - "127.0.0.1:8085:8082"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8082
      - POSTGRES_URL=postgresql://fin1_user:${POSTGRES_PASSWORD}@postgres:5432/fin1_analytics
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    volumes:
      - ./logs/analytics:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parse-server:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: fin1-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  minio_data:
    driver: local
  uptime_kuma_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
