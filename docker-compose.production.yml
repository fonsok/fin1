version: '3.8'

# FIN1 Production Docker Compose Configuration
# For Ubuntu 24.04 LTS Server Deployment
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  # Parse Server - Main Backend API
  parse-server:
    build:
      context: ./backend/parse-server
      dockerfile: Dockerfile
    container_name: fin1-parse-server
    ports:
      - "1338:1337"  # External port 1338 to avoid conflict
    env_file:
      - ./backend/.env
    environment:
      - PARSE_SERVER_DATABASE_URI=mongodb://admin:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/fin1?authSource=admin
      - PARSE_SERVER_CLOUD_CODE_MAIN=./cloud/main.js
    volumes:
      - ./backend/parse-server/cloud:/app/cloud
      - ./backend/parse-server/certs:/app/certs
      - ./backend/parse-server/logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB - Primary Database
  mongodb:
    image: mongo:7.0
    container_name: fin1-mongodb
    ports:
      - "0.0.0.0:27018:27017"  # External port 27018 to avoid conflict with host MongoDB on 27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-fin1-mongo-password}
      - MONGO_INITDB_DATABASE=fin1
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongodb/init:/docker-entrypoint-initdb.d
      - ./logs/mongodb:/var/log/mongodb
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Logging disabled to avoid permission issues
    # command: mongod --logpath /var/log/mongodb/mongod.log --logappend

  # Redis - Caching and Session Storage
  redis:
    image: redis:7.2-alpine
    container_name: fin1-redis
    ports:
      - "127.0.0.1:6380:6379"  # External port 6380 to avoid conflict with host Redis on 6379
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-fin1-redis-password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # PostgreSQL - Analytics and Reporting Database
  postgres:
    image: postgres:15-alpine
    container_name: fin1-postgres
    ports:
      - "127.0.0.1:5433:5432"  # External port 5433 to avoid conflict with host PostgreSQL on 5432
    environment:
      - POSTGRES_DB=fin1_analytics
      - POSTGRES_USER=fin1_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fin1-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init:/docker-entrypoint-initdb.d
      - ./logs/postgres:/var/log/postgresql
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin1_user -d fin1_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MinIO - File Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: fin1-minio
    ports:
      - "9002:9000"  # External port 9002 to avoid conflict
      - "9003:9001"  # External port 9003 to avoid conflict
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-fin1-minio-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-fin1-minio-password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - ./logs/minio:/var/log/minio
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx - Reverse Proxy and Load Balancer
  nginx:
    image: nginx:alpine
    container_name: fin1-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      parse-server:
        condition: service_healthy
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Market Data Service - Real-time trading data
  market-data:
    build:
      context: ./backend/market-data
      dockerfile: Dockerfile
    container_name: fin1-market-data
    ports:
      - "8083:8080"  # External port 8083 to avoid conflict
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
      - REDIS_URL=redis://:${REDIS_PASSWORD:-fin1-redis-password}@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    depends_on:
      redis:
        condition: service_healthy
      parse-server:
        condition: service_healthy
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Notification Service - Push notifications
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: fin1-notification-service
    ports:
      - "8084:8081"  # External port 8084 to avoid conflict
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-fin1-redis-password}@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    volumes:
      - ./backend/notification-service/certs:/app/certs:ro
      - ./logs/notifications:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      parse-server:
        condition: service_healthy
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Analytics Service - Data processing and reporting
  analytics-service:
    build:
      context: ./backend/analytics-service
      dockerfile: Dockerfile
    container_name: fin1-analytics-service
    ports:
      - "8085:8082"  # External port 8085 to avoid conflict
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_URL=postgresql://fin1_user:${POSTGRES_PASSWORD:-fin1-postgres-password}@postgres:5432/fin1_analytics
      - REDIS_URL=redis://:${REDIS_PASSWORD:-fin1-redis-password}@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    volumes:
      - ./logs/analytics:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parse-server:
        condition: service_healthy
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  fin1-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
