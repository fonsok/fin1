# Stack for the Ubuntu fin1-server (`~/fin1-server`; runbook: Documentation/FIN1_APP_DOCS/06A_BACKEND_UBUNTU_IOBOX_RUNBOOK.md).
# iOS Simulator: SSH -L 8443:127.0.0.1:443 user@server → https://localhost:8443/parse — siehe Config/FIN1-Dev.xcconfig.
services:
  # Parse Server - Main Backend API
  parse-server:
    build:
      context: ./backend/parse-server
      dockerfile: ../node-service.Dockerfile
      args:
        SERVICE_PORT: 1337
        EXTRA_DIR: certs
        HEALTHCHECK_START: 60s
    container_name: fin1-parse-server
    ports:
      - "1338:1337"  # External port 1338 (like production)
    environment:
      - PARSE_SERVER_APPLICATION_ID=fin1-app-id
      - PARSE_SERVER_MASTER_KEY=fin1-master-key
      - PARSE_SERVER_DATABASE_URI=mongodb://admin:QgQl3nnPdIuA7ZxIq9IviL3OItM5FLTI@mongodb:27017/fin1?authSource=admin
      - PARSE_SERVER_CLOUD_CODE_MAIN=./cloud/main.js
      # When using nginx on port 80:
      - PARSE_SERVER_PUBLIC_SERVER_URL=http://localhost/parse
      - PARSE_SERVER_LIVE_QUERY_SERVER_URL=ws://localhost/parse
      - PARSE_SERVER_PUSH_APNS_CERT_PATH=
      - PARSE_SERVER_PUSH_APNS_KEY_ID=your-key-id
      - PARSE_SERVER_PUSH_APNS_TEAM_ID=your-team-id
      - PARSE_SERVER_PUSH_APNS_BUNDLE_ID=com.fin1.app
      - PARSE_SERVER_PUSH_APNS_PRODUCTION=false
    volumes:
      - ./backend/parse-server/cloud:/app/cloud
      - ./backend/parse-server/certs:/app/certs
      - ./backend/parse-server/logs:/app/logs
    depends_on:
      - mongodb
      - redis
    networks:
      - fin1-network
    # Robust probe: supports both Parse /health and /parse/health paths,
    # and allows slower cold-starts before marking unhealthy.
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:1337/health || wget --quiet --tries=1 --spider http://127.0.0.1:1337/parse/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # MongoDB - Primary Database
  mongodb:
    image: mongo:7.0
    container_name: fin1-mongodb
    ports:
      - "127.0.0.1:27018:27017"  # Security: Only localhost access
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=QgQl3nnPdIuA7ZxIq9IviL3OItM5FLTI
      - MONGO_INITDB_DATABASE=fin1
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - fin1-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 })\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis - Caching and Session Storage
  redis:
    image: redis:7.2-alpine
    container_name: fin1-redis
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --appendonly yes --requirepass fin1-redis-password
    volumes:
      - redis_data:/data
    networks:
      - fin1-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a fin1-redis-password ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # PostgreSQL - Analytics and Reporting Database
  postgres:
    image: postgres:15-alpine
    container_name: fin1-postgres
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_DB=fin1_analytics
      - POSTGRES_USER=fin1_user
      - POSTGRES_PASSWORD=fin1-postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - fin1-network
    restart: unless-stopped

  # MinIO - File Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: fin1-minio
    ports:
      - "127.0.0.1:9002:9000"  # Security: Only localhost access
      - "127.0.0.1:9003:9001"  # Security: Only localhost access
    environment:
      - MINIO_ROOT_USER=fin1-minio-admin
      - MINIO_ROOT_PASSWORD=fin1-minio-password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fin1-network
    restart: unless-stopped

  # Nginx - Reverse Proxy and Load Balancer
  nginx:
    image: nginx:alpine
    container_name: fin1-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./backend/nginx/ssl:/etc/nginx/ssl
      # SPA output: run `npm run build` in admin-portal (syncs to admin/). Not committed — see admin/README.md
      - ./admin:/var/www/admin:ro
    depends_on:
      - parse-server
    networks:
      - fin1-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Market Data Service - Real-time trading data
  market-data:
    build:
      context: ./backend/market-data
      dockerfile: ../node-service.Dockerfile
      args:
        SERVICE_PORT: 8080
        EXTRA_DIR: cache
    container_name: fin1-market-data
    ports:
      - "127.0.0.1:8083:8080"  # Security: Only localhost access
    environment:
      - REDIS_URL=redis://:fin1-redis-password@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
      - MARKET_DATA_API_KEY=your-market-data-api-key
    depends_on:
      - redis
      - parse-server
    networks:
      - fin1-network
    restart: unless-stopped

  # Notification Service - Push notifications
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: ../node-service.Dockerfile
      args:
        SERVICE_PORT: 8081
        EXTRA_DIR: certs
    container_name: fin1-notification-service
    ports:
      - "127.0.0.1:8084:8081"  # Security: Only localhost access
    environment:
      - REDIS_URL=redis://:fin1-redis-password@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
      - APNS_CERT_PATH=/app/certs/apns.p12
      - FCM_SERVER_KEY=your-fcm-server-key
    volumes:
      - ./backend/notification-service/certs:/app/certs
    depends_on:
      - redis
      - parse-server
    networks:
      - fin1-network
    restart: unless-stopped

  # Analytics Service - Data processing and reporting
  analytics-service:
    build:
      context: ./backend/analytics-service
      dockerfile: ../node-service.Dockerfile
      args:
        SERVICE_PORT: 8082
        EXTRA_DIR: reports
    container_name: fin1-analytics-service
    ports:
      - "127.0.0.1:8085:8082"  # Security: Only localhost access
    environment:
      - POSTGRES_URL=postgresql://fin1_user:fin1-postgres-password@postgres:5432/fin1_analytics
      - REDIS_URL=redis://:fin1-redis-password@redis:6379
      - PARSE_SERVER_URL=http://parse-server:1337/parse
    depends_on:
      - postgres
      - redis
      - parse-server
    networks:
      - fin1-network
    restart: unless-stopped

  # PDF Service - Professional PDF generation (DIN A4, German standards)
  pdf-service:
    build:
      context: ./backend/pdf-service
      dockerfile: Dockerfile
    container_name: fin1-pdf-service
    ports:
      - "8087:8083"  # Avoid collision with market-data (8083)
    environment:
      - PARSE_SERVER_URL=http://parse-server:1337/parse
      - PARSE_SERVER_APPLICATION_ID=fin1-app-id
      - PARSE_SERVER_MASTER_KEY=fin1-master-key
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=fin1-minio-admin
      - MINIO_SECRET_KEY=fin1-minio-password
      - MINIO_BUCKET=fin1-documents
    volumes:
      - ./backend/pdf-service/templates:/app/templates
      - pdf_generated:/app/generated
    depends_on:
      - parse-server
      - minio
    networks:
      - fin1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  redis_data:
  postgres_data:
  minio_data:
  pdf_generated:

networks:
  fin1-network:
    driver: bridge
